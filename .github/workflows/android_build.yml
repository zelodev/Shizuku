name: Android CI

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

env:
  GRADLE_OPTS: -Dkotlin.incremental=false -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout Forked Repo
        uses: actions/checkout@v4
        with:
          repository: zelodev/Shizuku
          ref: master
          fetch-depth: 0
          submodules: true

      - name: Write temporary key
        if: hashFiles('key.jks') == '' && !steps.vars.outputs.HAS_SECRET
        run: |
          keytool -genkey -alias a -dname CN=_ -storepass passwd -keypass passwd -keystore key.jks
          echo KEYSTORE_PASSWORD=passwd >> signing.properties
          echo KEYSTORE_ALIAS=a >> signing.properties
          echo KEYSTORE_ALIAS_PASSWORD=passwd >> signing.properties
          echo KEYSTORE_FILE=../key.jks >> signing.properties

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        id: buildWithGradle
        run: |
          echo 'org.gradle.caching=true' >> gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          echo 'org.gradle.vfs.watch=true' >> gradle.properties
          
          ./gradlew :manager:assembleRelease
          ./gradlew :manager:assembleRelease :manager:assembleDebug
          releaseName=`ls manager/build/outputs/apk/release/shizuku*-v*-release.apk | awk -F '(/|.apk)' '{print $6}'` && echo "releaseName=$releaseName" >> $GITHUB_OUTPUT

          if ls manager/build/outputs/apk/release/shizuku*-v*-release.apk 1> /dev/null 2>&1; then
            releaseName=`ls manager/build/outputs/apk/release/shizuku*-v*-release.apk | awk -F '(/|.apk)' '{print $6}'`
            echo "releaseName=$releaseName" >> $GITHUB_OUTPUT
          else
            echo "Error: APK file not found." >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildWithGradle.outputs.releaseName }}
          path: "manager/build/outputs/apk/release/*.apk"
